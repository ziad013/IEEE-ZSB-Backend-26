<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Admin - UniCore</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 30px;
    background-color: #f9f9f9;
    color: #333;
}


h1 {
    color: #00539C;
    text-align: center;
}

h2 {
    color: #0077CC;
    margin-top: 30px;
}


address {
    font-style: normal;
    line-height: 1.6;
    background-color: #eef5fb;
    padding: 10px;
    border-left: 4px solid #00539C;
    width: fit-content;
}


a {
    color: #0077CC;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}


form {
    margin-top: 20px;
    background-color: #eef5fb;
    padding: 20px;
    border-radius: 8px;
    width: fit-content;
}


textarea {
    font-family: Arial, sans-serif;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    resize: vertical;
}


button {
    background-color: #00539C;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background-color: #0077CC;
}
</style>

</head>
<body>

<h1>Contact Admin</h1>

<h2>Location Of University</h2>
<address>
UniCore University<br>
15 ElZamalek Street<br>
Cairo, Egypt
</address>

<h2>Send Email to Admin</h2>
<p>
<a href="mailto:admin@unicore.fake">Email Admin</a>
</p>

<form>
<label>Your Feedback:</label><br>
<textarea rows="10" cols="50" placeholder="Write your feedback....."></textarea>
<br><br>
<button type="submit">Submit</button>
</form>

</body>
</html>
